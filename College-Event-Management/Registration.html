<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="Home.html">College Events</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="Gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Registration.html">Registration</a></li>
                    <li class="nav-item"><a class="nav-link" href="Schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="FAQ.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="Contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">Event Registration Form</h1>

        <div id="successMsg" class="alert alert-success d-none">
            Registration Successful!
        </div>

        <form id="registrationForm">
            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control" placeholder="Enter student name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" placeholder="Enter roll number" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Branch</label>
                <select class="form-select" required>
                    <option value="">Select Branch</option>
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>MECH</option>
                    <option>CIVIL</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" placeholder="Enter mobile number" pattern="[0-9]{10}" maxlength="10" required>
                <div class="form-text">Enter exactly 10 digits.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Event Selection</label>
                <select class="form-select" required>
                    <option value="">Select Event</option>
                    <option>Technical Quiz</option>
                    <option>Hackathon</option>
                    <option>Poster Presentation</option>
                    <option>Coding Contest</option>
                    <option>Project Expo</option>
                    <option>Cultural Fest</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
